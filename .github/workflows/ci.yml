name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: 単体テスト (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E テスト (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Playwright ブラウザを準備
        run: npx playwright install --with-deps chromium
      - name: E2E 実行
        run: npm run test:e2e
        env:
          CI: "true"
      - name: レポートを保存
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
